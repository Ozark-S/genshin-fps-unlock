name: Build EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v1.0.2

    - name: Build
      run: msbuild unlockfps/unlockfps.vcxproj /p:Configuration=Release /p:Platform=Win32

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: UnlockFPS
        path: unlockfps/Release/*.exe
